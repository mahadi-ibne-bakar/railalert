{% extends "base.html" %}
{% block title %}Track a new train - railalert{% endblock %}
{% block content %}
<h1>Find a train to track</h1>
<form method="post">
  <label>From
    <input type="text" name="from_city" list="stations" required autocomplete="off" placeholder="e.g. Chattogram">
  </label>
  <label>To
    <input type="text" name="to_city" list="stations" required autocomplete="off" placeholder="e.g. Dhaka">
  </label>
  <datalist id="stations">
    {% for s in stations %}<option value="{{ s }}">{% endfor %}
  </datalist>

  <label>Date of journey
    <input type="date" name="date_of_journey" min="{{ today }}" max="{{ max_date }}" required>
  </label>
  <p class="hint">Bangladesh Railway only opens bookings up to 10 days ahead, so that's as far out as you can search.</p>

  <button type="submit">Search trains</button>
</form>
{% endblock %}
