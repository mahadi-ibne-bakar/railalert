name: Rail Seat Watcher

on:
  schedule:
    # Every 5 minutes. GitHub won't honor anything tighter than this, and
    # during busy periods runs can be delayed a few minutes regardless.
    - cron: "*/5 * * * *"
  workflow_dispatch: {}   # lets you trigger a manual test run from the Actions tab

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run worker
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          RAIL_TOKEN: ${{ secrets.RAIL_TOKEN }}
          RAIL_DEVICE_ID: ${{ secrets.RAIL_DEVICE_ID }}
          RAIL_DEVICE_KEY: ${{ secrets.RAIL_DEVICE_KEY }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          OPERATOR_EMAIL: ${{ secrets.OPERATOR_EMAIL }}
          APP_BASE_URL: ${{ secrets.APP_BASE_URL }}
        run: python worker.py
